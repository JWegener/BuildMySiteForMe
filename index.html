<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Personal website builder</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f5f1e8;
      --muted: #b8b2a6;
      --subtle: #81796d;
      --carbon: #151515;
      --panel: #1d1d1a;
      --panel-2: #24241f;
      --line: rgba(245, 241, 232, 0.16);
      --mint: #00f0c8;
      --green: #a8ff3e;
      --coral: #ff6b53;
      --amber: #ffc857;
      --sky: #60d8ff;
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.38);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: #111;
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(245,241,232,0.035) 1px, transparent 1px),
        linear-gradient(180deg, rgba(245,241,232,0.035) 1px, transparent 1px),
        radial-gradient(circle at 18% 12%, rgba(255, 107, 83, 0.16), transparent 26rem),
        radial-gradient(circle at 86% 26%, rgba(0, 240, 200, 0.13), transparent 29rem),
        linear-gradient(135deg, #20201d 0%, #111 48%, #171713 100%);
      background-size: 48px 48px, 48px 48px, auto, auto, auto;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.17;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.7' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='220' height='220' filter='url(%23n)' opacity='.62'/%3E%3C/svg%3E");
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .shell {
      width: min(1440px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 24px;
    }

    .topbar {
      min-height: 44px;
      display: flex;
      align-items: center;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      max-width: 100%;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(21px, 2vw, 30px);
      line-height: 1;
      white-space: nowrap;
    }

    .brand span:last-child {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      color: #111;
      background: var(--green);
      border: 2px solid rgba(17, 17, 17, 0.7);
      box-shadow: 5px 5px 0 var(--coral);
      font-family: "Courier New", monospace;
      font-size: 18px;
      font-weight: 800;
    }

    .status-strip {
      display: none;
      align-items: center;
      gap: 10px;
      min-width: 0;
      max-width: 100%;
      padding: 9px 12px;
      color: var(--muted);
      background: rgba(17, 17, 17, 0.6);
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 12px;
    }

    .status-strip span:last-child {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .pulse {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--mint);
      box-shadow: 0 0 0 0 rgba(0, 240, 200, 0.7);
      animation: ping 1.8s infinite;
    }

    @keyframes ping {
      70% { box-shadow: 0 0 0 10px rgba(0, 240, 200, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 240, 200, 0); }
    }

    .session-pill {
      display: none;
      align-items: center;
      gap: 8px;
      min-width: 0;
      max-width: 100%;
      padding: 9px 12px;
      color: var(--ink);
      background: rgba(255, 200, 87, 0.12);
      border: 1px solid rgba(255, 200, 87, 0.34);
      border-radius: 999px;
      font-family: "Courier New", monospace;
      font-size: 12px;
    }

    .session-pill span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .hero {
      min-height: calc(100vh - 96px);
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 18px;
      align-items: stretch;
      max-width: 920px;
      margin: 0 auto;
      padding: 34px 0 24px;
    }

    .handoff {
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: auto;
      padding: clamp(20px, 3vw, 34px);
      background: rgba(20, 20, 18, 0.88);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .handoff::after {
      content: "";
      position: absolute;
      inset: auto 24px 0 24px;
      height: 3px;
      background: linear-gradient(90deg, var(--coral), var(--amber), var(--mint), var(--sky));
    }

    .eyebrow {
      color: var(--mint);
      font-family: "Courier New", monospace;
      font-size: 13px;
      text-transform: uppercase;
    }

    h1 {
      max-width: 11ch;
      margin: 18px 0 16px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(52px, 7vw, 102px);
      line-height: 0.88;
      font-weight: 700;
    }

    .lede {
      max-width: 62ch;
      margin: 0 0 26px;
      color: var(--muted);
      font-size: clamp(16px, 1.7vw, 20px);
      line-height: 1.55;
    }

    .prompt-card {
      display: flex;
      flex-direction: column;
      background:
        linear-gradient(180deg, rgba(245, 241, 232, 0.08), transparent 64px),
        #10100f;
      border: 1px solid rgba(245, 241, 232, 0.18);
      border-radius: var(--radius);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.025),
        0 22px 70px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .prompt-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 46px;
      padding: 0 13px;
      color: var(--subtle);
      background: rgba(17, 17, 17, 0.84);
      border-bottom: 1px solid rgba(245, 241, 232, 0.13);
      font-family: "Courier New", monospace;
      font-size: 12px;
      text-transform: uppercase;
    }

    .traffic {
      display: flex;
      gap: 8px;
      flex: 0 0 auto;
    }

    .traffic i {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: block;
      box-shadow: inset 0 -1px 0 rgba(0, 0, 0, 0.28);
    }

    .traffic i:nth-child(1) { background: #ff5f57; }
    .traffic i:nth-child(2) { background: #ffbd2e; }
    .traffic i:nth-child(3) { background: #28c840; }

    .address-bar {
      min-width: 0;
      flex: 1 1 auto;
      padding: 8px 12px;
      color: rgba(245, 241, 232, 0.68);
      background: rgba(245, 241, 232, 0.075);
      border: 1px solid rgba(245, 241, 232, 0.1);
      border-radius: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-transform: none;
    }

    #copyState {
      flex: 0 0 auto;
      color: var(--amber);
    }

    textarea {
      width: 100%;
      min-height: 188px;
      padding: 18px 18px 8px;
      resize: vertical;
      border: 0;
      outline: 0;
      color: var(--mint);
      background: transparent;
      font-family: "Courier New", monospace;
      font-size: clamp(14px, 1.45vw, 17px);
      line-height: 1.55;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 0 16px 16px;
    }

    .primary,
    .ghost {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 15px;
      border-radius: 6px;
      font-weight: 700;
      transition: transform 160ms ease, background 160ms ease, color 160ms ease;
    }

    .primary {
      color: #111;
      background: var(--green);
      box-shadow:
        0 0 24px rgba(168, 255, 62, 0.28),
        5px 5px 0 rgba(255, 107, 84, 0.88);
    }

    .prompt-card .primary {
      width: 100%;
      min-height: 58px;
      font-size: clamp(15px, 1.5vw, 18px);
    }

    .ghost {
      color: var(--ink);
      background: rgba(245, 241, 232, 0.09);
      border: 1px solid var(--line);
    }

    .primary:hover,
    .ghost:hover {
      transform: translateY(-2px);
    }

    .feed {
      display: grid;
      gap: 8px;
      margin-top: auto;
      padding-top: 22px;
      color: var(--muted);
      font-family: "Courier New", monospace;
      font-size: 12px;
    }

    .feed-row {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 10px;
      padding: 9px 0;
      border-top: 1px dashed rgba(245, 241, 232, 0.14);
    }

    .feed-row strong {
      color: var(--amber);
      font-weight: 400;
    }

    .stage {
      position: relative;
      min-height: auto;
      margin-top: 18px;
      display: grid;
      background: rgba(245, 241, 232, 0.045);
      border: 1px solid rgba(245, 241, 232, 0.14);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .stage.waiting {
      border-color: rgba(0, 240, 200, 0.42);
      animation: waitingPulse 1.9s ease-in-out infinite;
    }

    @keyframes waitingPulse {
      0%, 100% {
        background: rgba(245, 241, 232, 0.045);
      }
      50% {
        background: rgba(0, 240, 200, 0.075);
      }
    }

    .stage-top {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      min-height: 48px;
      padding: 0 16px;
    }

    .waiting-label {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .wait-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      display: block;
      flex: 0 0 auto;
      background: var(--mint);
      animation: dotPulse 1.25s ease-in-out infinite;
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 0.42; transform: scale(0.85); }
      50% { opacity: 1; transform: scale(1.08); }
    }

    .stage-title {
      min-width: 0;
      color: var(--muted);
      font-family: "Courier New", monospace;
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .stage-body {
      position: relative;
      display: grid;
      align-content: space-between;
      gap: 12px;
      min-height: 0;
      padding: 10px;
    }

    .launch-panel {
      display: none;
      gap: 18px;
      padding: clamp(18px, 3vw, 28px);
      background:
        linear-gradient(135deg, rgba(0, 240, 200, 0.14), transparent 46%),
        rgba(17, 17, 17, 0.58);
      border: 1px solid rgba(0, 240, 200, 0.24);
      border-radius: var(--radius);
    }

    .launch-panel.ready {
      display: grid;
    }

    .launch-kicker {
      color: var(--mint);
      font-family: "Courier New", monospace;
      font-size: 12px;
      text-transform: uppercase;
    }

    .launch-panel h2 {
      max-width: 13ch;
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(30px, 4vw, 46px);
      line-height: 0.9;
    }

    .launch-panel p {
      max-width: 56ch;
      margin: 0;
      color: var(--muted);
      font-size: clamp(15px, 1.45vw, 18px);
      line-height: 1.55;
    }

    .launch-button {
      display: none;
      align-items: center;
      justify-content: center;
      width: min(100%, 430px);
      min-height: 66px;
      padding: 0 22px;
      color: #111;
      background: var(--green);
      border-radius: 6px;
      box-shadow:
        0 0 28px rgba(168, 255, 62, 0.5),
        0 0 76px rgba(0, 240, 200, 0.28),
        7px 7px 0 var(--coral);
      font-size: clamp(17px, 2vw, 22px);
      font-weight: 800;
      text-decoration: none;
      transition: transform 160ms ease, box-shadow 160ms ease;
      animation: launchGlow 1.9s ease-in-out infinite alternate;
    }

    .launch-button:hover {
      transform: translateY(-3px);
      box-shadow:
        0 0 36px rgba(168, 255, 62, 0.72),
        0 0 96px rgba(0, 240, 200, 0.36),
        9px 9px 0 var(--coral);
    }

    .launch-panel.ready .launch-button {
      display: inline-flex;
    }

    .launch-panel.ready .pending-note {
      display: none;
    }

    @keyframes launchGlow {
      from { filter: saturate(1); }
      to { filter: saturate(1.25) brightness(1.08); }
    }

    .site-preview {
      position: relative;
      display: grid;
      grid-template-columns: minmax(220px, 0.78fr) minmax(280px, 1.22fr);
      gap: clamp(16px, 2vw, 30px);
      padding: clamp(20px, 4vw, 48px);
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0)),
        #eee7d5;
      color: #17130f;
    }

    .portrait {
      min-height: 100%;
      display: grid;
      align-content: end;
      gap: 18px;
      padding: 22px;
      color: #f5f1e8;
      background:
        linear-gradient(160deg, rgba(0,0,0,0), rgba(0,0,0,0.48)),
        linear-gradient(135deg, #ff6b53, #ffc857 48%, #00f0c8);
      border: 2px solid #17130f;
      border-radius: var(--radius);
      box-shadow: 10px 10px 0 #17130f;
      overflow: hidden;
    }

    .portrait-art {
      width: min(210px, 100%);
      aspect-ratio: 1;
      justify-self: center;
      display: grid;
      place-items: center;
      border: 2px solid rgba(23, 19, 15, 0.5);
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 35%, #f5f1e8 0 17%, transparent 18%),
        radial-gradient(circle at 50% 74%, #17130f 0 25%, transparent 26%),
        radial-gradient(circle at 50% 56%, rgba(245, 241, 232, 0.86) 0 37%, transparent 38%),
        repeating-linear-gradient(45deg, rgba(23,19,15,.18) 0 8px, transparent 8px 16px);
    }

    .portrait h2 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(28px, 3.6vw, 52px);
      line-height: 0.96;
    }

    .portrait p {
      margin: 0;
      font-weight: 700;
      line-height: 1.3;
    }

    .generated {
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: clamp(16px, 2vw, 24px);
    }

    .generated nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-family: "Courier New", monospace;
      font-size: 12px;
      text-transform: uppercase;
    }

    .generated nav span {
      padding: 7px 10px;
      color: #17130f;
      background: rgba(23, 19, 15, 0.08);
      border: 1px solid rgba(23, 19, 15, 0.18);
      border-radius: 999px;
    }

    .generated h2 {
      max-width: 12ch;
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(44px, 6.2vw, 88px);
      line-height: 0.9;
    }

    .generated p {
      max-width: 64ch;
      margin: 0;
      color: #4b4037;
      font-size: clamp(15px, 1.4vw, 18px);
      line-height: 1.55;
    }

    .trait-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .trait {
      min-height: 92px;
      padding: 12px;
      border: 1px solid rgba(23, 19, 15, 0.2);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.42);
    }

    .trait b {
      display: block;
      margin-bottom: 8px;
      font-family: "Courier New", monospace;
      font-size: 12px;
      color: #17130f;
    }

    .trait span {
      color: #5d5044;
      font-size: 13px;
      line-height: 1.35;
    }

    .quote-grid {
      display: grid;
      gap: 10px;
    }

    .quote {
      margin: 0;
      padding: 14px;
      color: #17130f;
      background: rgba(23, 19, 15, 0.07);
      border: 1px solid rgba(23, 19, 15, 0.18);
      border-radius: var(--radius);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 17px;
      line-height: 1.35;
    }

    .quote cite {
      display: block;
      margin-top: 9px;
      color: #6b5d50;
      font-family: "Courier New", monospace;
      font-size: 12px;
      font-style: normal;
      text-transform: uppercase;
    }

    body.site-mode {
      background: #eee7d5;
    }

    body.site-mode::before,
    body.site-mode .shell {
      display: none;
    }

    .site-page {
      display: none;
      min-height: 100vh;
    }

    body.site-mode .site-page {
      display: block;
    }

    @media (max-width: 1060px) {
      .topbar {
        grid-template-columns: 1fr;
        justify-items: start;
      }

      .status-strip,
      .session-pill {
        justify-self: start;
      }

      .handoff,
      .stage {
        min-height: auto;
      }
    }

    @media (max-width: 720px) {
      .shell {
        width: min(100vw - 22px, 680px);
        padding-top: 16px;
      }

      .hero {
        padding-top: 22px;
      }

      .site-preview {
        grid-template-columns: 1fr;
      }

      .portrait {
        min-height: 320px;
      }

      .trait-grid {
        grid-template-columns: 1fr 1fr;
      }

      .stage-top {
        min-height: 48px;
      }
    }

    @media (max-width: 440px) {
      .actions {
        flex-direction: column;
      }

      .primary,
      .ghost {
        width: 100%;
      }

      .trait-grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 44px;
      }
    }
  </style>
</head>
<body>
  <main class="site-page" id="sitePage" aria-label="Generated personal website"></main>

  <main class="shell">
    <header class="topbar" aria-label="Site header">
      <div class="brand">
        <span class="brand-mark">B</span>
        <span>Personal website builder</span>
      </div>
      <div class="status-strip">
        <span class="pulse" aria-hidden="true"></span>
        <span id="roomStatus">Waiting for agent</span>
      </div>
      <div class="session-pill" title="This ID ties your browser session to the agent handoff">
        <span>room</span>
        <span id="sessionId">loading</span>
      </div>
    </header>

    <section class="hero" aria-label="Agent handoff and live website preview">
      <div class="handoff">
        <h1>Your agent builds you a site</h1>

        <div class="prompt-card">
          <div class="prompt-head">
            <div class="traffic" aria-hidden="true"><i></i><i></i><i></i></div>
            <span class="address-bar">https://your-personal-website.com</span>
            <span id="copyState">ready</span>
          </div>
          <textarea id="agentPrompt" spellcheck="false"></textarea>
          <div class="actions">
            <button class="primary" id="copyPrompt" type="button">Copy prompt and give to your agent</button>
          </div>
        </div>

        <div class="stage waiting" id="stageConsole">
          <div class="stage-top">
            <div class="waiting-label">
              <span class="wait-dot" aria-hidden="true"></span>
              <div class="stage-title" id="stageTitle">Waiting</div>
            </div>
          </div>

          <div class="stage-body">
            <section class="launch-panel" id="launchPanel">
              <h2 id="launchHeadline">Build in progress.</h2>
              <p id="launchCopy" class="pending-note"></p>
              <a class="launch-button" id="launchButton" href="#" target="_blank" rel="noopener">Open my personal site</a>
            </section>
          </div>
        </div>

        <div class="feed" aria-live="polite" id="feed"></div>
      </div>
    </section>

  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const roomFromPath = location.pathname.match(/^\/room\/([a-zA-Z0-9-]{4,80})$/)?.[1];
    const siteFromPath = location.pathname.match(/^\/site\/([a-zA-Z0-9-]{4,80})$/)?.[1];
    const isSiteMode = Boolean(siteFromPath);
    let sessionId = params.get("room") || roomFromPath || siteFromPath || "";
    const appOrigin = location.protocol === "file:" ? "http://localhost:4178" : location.origin;
    let ingestUrl = "";
    let statusUrl = "";
    let eventsUrl = "";
    let siteUrl = "";
    let roomSource = null;
    let latestContext = null;
    let generationComplete = false;
    const promptEl = document.getElementById("agentPrompt");
    const copyState = document.getElementById("copyState");
    const roomStatus = document.getElementById("roomStatus");
    const feed = document.getElementById("feed");
    const stageConsole = document.getElementById("stageConsole");
    const launchPanel = document.getElementById("launchPanel");
    const launchButton = document.getElementById("launchButton");
    const sitePage = document.getElementById("sitePage");

    const contextPayloadTemplate = {
      name: "Use my real approved public name",
      summary: "Use a funny, specific, public-safe summary with the energy of my AI agent writing a dating-profile roast I approved for display.",
      interests: ["real approved obsession, recurring bit, errand archaeology, or interest"],
      projects: [],
      skills: ["real approved skill, superpower, or suspiciously specific competence that reveals personality"],
      taste: ["real approved taste note, preference, anti-preference, roastable standard, or house style"],
      traits: ["real approved trait", "real approved trait", "real approved trait"],
      testimonials: [
        { quote: "Real funny approved quote about my personality, quirks, or lore.", signed: "my AI" },
        { quote: "Real funny approved quote about my taste, habits, or catchphrases.", signed: "my AI" },
        { quote: "Real funny approved quote that sounds like it came from an AI agent that knows me too well.", signed: "my AI" }
      ]
    };

    promptEl.value = "Creating your unique room number...";

    function configureRoom(id, shouldReplaceUrl = false) {
      sessionId = id;
      ingestUrl = `${appOrigin}/api/build-room/${sessionId}/context`;
      statusUrl = `${appOrigin}/api/build-room/${sessionId}/status`;
      eventsUrl = `${appOrigin}/api/build-room/${sessionId}/events`;
      siteUrl = `${appOrigin}/site/${encodeURIComponent(sessionId)}`;

      document.getElementById("sessionId").textContent = sessionId;
      document.getElementById("stageTitle").textContent = "Waiting";
      launchButton.href = siteUrl;
      promptEl.value = buildPrompt();

      if (shouldReplaceUrl && location.protocol !== "file:") {
        history.replaceState(null, "", `/room/${encodeURIComponent(sessionId)}`);
      }
    }

    function buildPrompt() {
      return `Dear agent, please help me create a personal website through Build My Site For Me.

Room number: ${sessionId}
Status endpoint: ${statusUrl}
Ingest endpoint: ${ingestUrl}

First, POST this status update so the browser changes in front of the user:
{
  "stage": "agent-started",
  "message": "Agent connected. Gathering personal context.",
  "progress": 32
}

Please gather the funniest, most specific, public-safe personal context about me from our history and from what I explicitly approve sharing. Do not make this feel like a resume. I care much more about quirks, catchphrases, recurring bits, strong opinions, funny habits, taste, anti-taste, and "this could only be them" details than formal projects.

Tone target: write like my AI agent is building me a dating profile and gently roasting me with affection. The landing page should feel unusually specific, funny, and observant, like: "They do not want vibes; they want the page open, the evidence current, and the path clickable." Keep it warm, not mean. Make the jokes come from real approved details, not generic snark.

Get creative about finding personal texture. Look for:
- my name
- a concise, funny summary of who I am, with a light roast or oddly exact observation
- obsessions, bits, catchphrases, preferences, pet peeves, and taste
- skills or superpowers only if they reveal personality
- projects only if they are genuinely part of the lore; otherwise use an empty projects array
- 3-5 traits that would make a personal website feel unmistakably me
- 3 humorous testimonial quotes about me signed by "my AI" that sound like an agent who has survived my habits

Ask a few quick questions if you need juicier material, for example:
- "What is a phrase you say too much?"
- "What is a weirdly strong opinion you hold?"
- "What would your friends roast you for?"
- "What is a tiny detail that would make this site feel illegally accurate?"
- "What is a thing you treat like a normal preference but is clearly a whole operating philosophy?"

Stay public-safe: do not include private contact info, financial details, addresses, private family details, health details, or anything embarrassing that I do not explicitly approve.

Before sending anything, ask me to confirm that the information is okay to use publicly.

While working, POST short status updates to the status endpoint using this shape:
{
  "stage": "gathering",
  "message": "Gathering quirks, catchphrases, taste, and public-safe lore.",
  "progress": 45
}

Use stage values like "gathering", "approval-needed", "approved", and "generating".

After I approve the public information, POST exactly this strict JSON shape to the ingest endpoint. Do not add unknown fields. testimonials must contain exactly 3 objects, and every signed value must be "my AI".

${JSON.stringify(contextPayloadTemplate, null, 2)}`;
    }

    function addFeed(message, code = "recv") {
      const row = document.createElement("div");
      const stamp = document.createElement("strong");
      const text = document.createElement("span");
      const now = new Date();
      row.className = "feed-row";
      stamp.textContent = now.toLocaleTimeString([], { minute: "2-digit", second: "2-digit" });
      text.textContent = `[${code}] ${message}`;
      row.append(stamp, text);
      feed.prepend(row);
    }

    function setProgress(value) {
      return Math.max(0, Math.min(100, Number(value) || 0));
    }

    function handleStatus(status) {
      if (!status || typeof status !== "object") return;
      const message = status.message || "Room status updated.";
      roomStatus.textContent = message;
      if (status.progress !== undefined) setProgress(status.progress);
      if (status.stage === "complete" || Number(status.progress) >= 100) {
        generationComplete = true;
        revealLaunchIfReady();
      }
      addFeed(message, status.stage || "status");
    }

    function firstName(name) {
      return String(name || "Someone").split(/\s+/)[0] || "Someone";
    }

    function listText(items, fallback) {
      return Array.isArray(items) && items.length ? items.join(", ") : fallback;
    }

    function renderTestimonials(items) {
      const testimonialGrid = document.getElementById("testimonialGrid");
      if (!testimonialGrid) return;
      testimonialGrid.textContent = "";
      const quotes = Array.isArray(items) && items.length ? items : [
        { quote: "Waiting for the agent to say something funny and oddly accurate.", signed: "my AI" }
      ];
      for (const item of quotes) {
        const block = document.createElement("blockquote");
        const cite = document.createElement("cite");
        block.className = "quote";
        block.textContent = `"${item.quote}"`;
        cite.textContent = `- ${item.signed || "my AI"}`;
        block.appendChild(cite);
        testimonialGrid.appendChild(block);
      }
    }

    function applyContext(data) {
      const name = data.name || "Someone interesting";
      const traits = Array.isArray(data.traits) ? data.traits : [];
      const tagline = traits.length
        ? `${firstName(name)} is ${traits.slice(0, 3).join(", ")}.`
        : "A personal site generated from agent context.";

      latestContext = data;
      renderPersonalSite(data);
      document.getElementById("launchHeadline").textContent = `${firstName(name)}'s site is ready.`;
      document.getElementById("launchCopy").textContent = `${tagline} Finalizing the generated site URL.`;
      roomStatus.textContent = `Built ${firstName(name)}'s site`;
      setProgress(100);
      revealLaunchIfReady();
      addFeed(`Applied strict context for ${name}. Personal site prepared at ${siteUrl}.`, "build");
    }

    function revealLaunchIfReady() {
      if (!latestContext || !generationComplete) return;
      const name = latestContext.name || "Someone interesting";
      const traits = Array.isArray(latestContext.traits) ? latestContext.traits : [];
      const tagline = traits.length
        ? `${firstName(name)} is ${traits.slice(0, 3).join(", ")}.`
        : "A personal site generated from agent context.";
      document.getElementById("launchHeadline").textContent = `${firstName(name)}'s site is ready.`;
      document.getElementById("launchCopy").textContent = tagline;
      document.getElementById("stageTitle").textContent = `Ready in room ${sessionId}`;
      stageConsole.classList.remove("waiting");
      launchPanel.classList.add("ready");
    }

    function siteMarkup(data = {}) {
      const name = data.name || "Someone interesting";
      const traits = Array.isArray(data.traits) ? data.traits : [];
      const tagline = traits.length
        ? `${firstName(name)} is ${traits.slice(0, 3).join(", ")}.`
        : "A personal site generated from agent context.";
      const testimonials = Array.isArray(data.testimonials) && data.testimonials.length ? data.testimonials : [
        { quote: "Waiting for the agent to say something funny and oddly accurate.", signed: "my AI" }
      ];

      return `
        <div class="site-preview" id="sitePreview">
          <aside class="portrait">
            <div class="portrait-art" aria-hidden="true"></div>
            <div>
              <h2 id="previewName">${escapeHtml(name)}</h2>
              <p id="previewTagline">${escapeHtml(tagline)}</p>
            </div>
          </aside>

          <section class="generated">
            <nav aria-label="Generated website sections">
              <span>About</span>
              <span>Signals</span>
              <span>Work</span>
              <span>Contact</span>
            </nav>
            <h2 id="previewHeadline">${escapeHtml(firstName(name))}'s corner of the internet.</h2>
            <p id="previewBio">${escapeHtml(data.summary || "The agent has not supplied a who-I-am summary yet.")}</p>
            <div class="trait-grid">
              <div class="trait"><b>Interests</b><span id="traitInterests">${escapeHtml(listText(data.interests, "Unassigned"))}</span></div>
              <div class="trait"><b>Skills</b><span id="traitSkills">${escapeHtml(listText(data.skills, "Unassigned"))}</span></div>
              <div class="trait"><b>Taste</b><span id="traitTaste">${escapeHtml(listText(data.taste, "Unassigned"))}</span></div>
            </div>
            <div class="quote-grid" id="testimonialGrid" aria-label="AI testimonials">
              ${testimonials.map((item) => `
                <blockquote class="quote">${escapeHtml(`"${item.quote}"`)}<cite>- ${escapeHtml(item.signed || "my AI")}</cite></blockquote>
              `).join("")}
            </div>
          </section>
        </div>
      `;
    }

    function renderPersonalSite(data) {
      sitePage.innerHTML = siteMarkup(data);
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    async function postStatus(update) {
      if (!statusUrl) return null;
      const response = await fetch(statusUrl, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(update)
      });
      const result = await response.json();
      if (!response.ok) {
        const details = Array.isArray(result.errors) ? result.errors.join(" ") : result.error || "Unknown status error.";
        throw new Error(details);
      }
      return result;
    }

    async function ensureRoom() {
      if (sessionId) {
        configureRoom(sessionId);
        return;
      }

      roomStatus.textContent = "Requesting unique room number";
      addFeed("Requesting server-issued room number.", "room");
      const response = await fetch(`${appOrigin}/api/build-room`, { method: "POST" });
      const result = await response.json();
      if (!response.ok) {
        throw new Error(result.error || "Could not create a room.");
      }
      configureRoom(result.roomId, true);
      addFeed(`Room number ${result.roomId} issued.`, "room");
      setProgress(12);
    }

    function connectRoom() {
      try {
        if (roomSource) roomSource.close();
        roomSource = new EventSource(eventsUrl);
        roomSource.addEventListener("open", () => {
          roomStatus.textContent = "Live room connected";
          setProgress(24);
        });
        roomSource.addEventListener("ready", () => {});
        roomSource.addEventListener("status", (event) => {
          const data = JSON.parse(event.data);
          handleStatus(data.payload);
        });
        roomSource.addEventListener("context", (event) => {
          const data = JSON.parse(event.data);
          applyContext(data.payload);
        });
        roomSource.addEventListener("error", (event) => {
          if (event.data) {
            const data = JSON.parse(event.data);
            addFeed(`${data.payload.message} ${data.payload.errors.join(" ")}`, "error");
          } else {
            roomStatus.textContent = "Trying to reconnect to live room";
          }
        });
      } catch (error) {
        addFeed(`Could not connect to room stream: ${error.message}`, "error");
      }
    }

    document.getElementById("copyPrompt").addEventListener("click", async () => {
      await navigator.clipboard.writeText(promptEl.value);
      copyState.textContent = "copied";
      addFeed("Prompt copied. Waiting for agent handoff.", "copy");
      postStatus({
        stage: "copied",
        message: "Prompt copied. Waiting for agent to connect.",
        progress: 24
      }).catch((error) => addFeed(`Copy status failed: ${error.message}`, "error"));
      setTimeout(() => { copyState.textContent = "ready"; }, 1600);
    });

    async function init() {
      if (isSiteMode) {
        document.body.classList.add("site-mode");
        configureRoom(sessionId);
        renderPersonalSite({});
        try {
          const response = await fetch(`${appOrigin}/api/build-room/${sessionId}/context`);
          const result = await response.json();
          if (response.ok && result.context) {
            renderPersonalSite(result.context);
          }
        } catch {
          renderPersonalSite({});
        }
        return;
      }

      setProgress(8);
      try {
        addFeed("Preparing live status stream.", "boot");
        await ensureRoom();
        connectRoom();
      } catch (error) {
        roomStatus.textContent = "Room setup failed";
        promptEl.value = `Room setup failed: ${error.message}`;
        addFeed(`Room setup failed: ${error.message}`, "error");
      }
    }

    init();
  </script>
</body>
</html>
